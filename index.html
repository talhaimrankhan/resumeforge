<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ResumeForge — Free Resume Builder &amp; CV Maker Online</title>
    <meta name="description" content="Build a professional, ATS-ready resume in minutes. Choose from 30 free &amp; premium resume templates, fill in a guided wizard, and download as PDF or PNG. Free to start — no subscription needed." />
    <meta name="keywords" content="resume builder, CV maker, free resume builder, ATS resume, resume templates, professional resume, CV builder online, resume maker, build resume online, free CV maker" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="ResumeForge" />
    <meta name="theme-color" content="#1e1b4b" />
    <link rel="canonical" href="https://resumeforge.app/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://resumeforge.app/" />
    <meta property="og:title" content="ResumeForge — Free Resume Builder &amp; CV Maker Online" />
    <meta property="og:description" content="Build a professional, ATS-ready resume in minutes. 30 resume templates, step-by-step wizard, PDF &amp; PNG export. Free to start." />
    <meta property="og:image" content="https://resumeforge.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ResumeForge — Free Resume Builder" />
    <meta property="og:site_name" content="ResumeForge" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@resumeforge" />
    <meta name="twitter:title" content="ResumeForge — Free Resume Builder &amp; CV Maker Online" />
    <meta name="twitter:description" content="Build a professional, ATS-ready resume in minutes. 30 resume templates, step-by-step wizard, PDF &amp; PNG export. Free to start." />
    <meta name="twitter:image" content="https://resumeforge.app/og-image.png" />
    <meta name="twitter:image:alt" content="ResumeForge — Free Resume Builder" />

    <!-- Performance: preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ResumeForge",
      "url": "https://resumeforge.app",
      "logo": "https://resumeforge.app/logo-icon.png",
      "description": "ResumeForge is a free online resume builder and CV maker. Create professional, ATS-ready resumes with 30 templates across 3 tiers. Download as PDF or PNG.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free to start. Premium templates from $4.99."
      },
      "featureList": [
        "ATS-friendly resume templates",
        "PDF and PNG export",
        "Step-by-step resume wizard",
        "30 professional resume templates",
        "Free resume builder",
        "CV maker online"
      ],
      "screenshot": "https://resumeforge.app/og-image.png",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "247",
        "bestRating": "5"
      }
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ResumeForge",
      "url": "https://resumeforge.app",
      "description": "Free resume builder and CV maker online. Build ATS-ready resumes with professional templates.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://resumeforge.app/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ResumeForge",
      "url": "https://resumeforge.app",
      "logo": "https://resumeforge.app/logo-icon.png",
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
