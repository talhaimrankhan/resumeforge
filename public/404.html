<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ResumeForge</title>
    <script>
      // GitHub Pages SPA redirect fix.
      // When GitHub Pages 404s on a deep route (e.g. /resumeforge/dashboard),
      // this script encodes the path into a query string and redirects to the
      // base URL. The main index.html then decodes it and restores the real URL.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=/' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
